<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .goal-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .goal-section label {
            display: block;
            color: #555;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .goal-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .goal-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }

        .progress-section {
            margin-bottom: 30px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-section label {
            display: block;
            color: #555;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-section input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .company-list {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .company-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .company-name {
            color: #333;
            font-weight: 500;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #999;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .mini-goal-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .mini-goal-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .mini-goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .mini-goal-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .mini-goal-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .status-on-track {
            background: #d4edda;
            color: #155724;
        }

        .status-behind {
            background: #f8d7da;
            color: #721c24;
        }

        .status-completed {
            background: #cfe2ff;
            color: #084298;
        }

        .mini-goal-time {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
        }

        .mini-goal-progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: #666;
        }

        .mini-goal-progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .mini-goal-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .mini-goal-actions {
            display: flex;
            gap: 8px;
        }

        .mini-goal-actions button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-complete {
            background: #28a745;
            color: white;
        }

        .btn-complete:hover {
            background: #218838;
        }

        .btn-delete-mini {
            background: #dc3545;
            color: white;
        }

        .btn-delete-mini:hover {
            background: #c82333;
        }

        .mini-goals-empty {
            text-align: center;
            color: #999;
            padding: 30px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Application Tracker</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
            <button class="tab-btn" onclick="switchTab('mini-goals')">Mini Goals</button>
            <button class="tab-btn" onclick="switchTab('companies')">Companies</button>
        </div>

        <!-- OVERVIEW TAB -->
        <div id="overview" class="tab-content active">
            <div class="goal-section">
                <label for="goalInput">Set Your Goal:</label>
                <input 
                    type="number" 
                    id="goalInput" 
                    placeholder="Enter your application goal (e.g., 50)" 
                    value="50"
                    min="1"
                >
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Applications</div>
                    <div class="stat-number" id="count">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Progress</div>
                    <div class="stat-number" id="percentage">0%</div>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-label">
                    <span>Goal Progress</span>
                    <span id="progressText">0 / 50</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- MINI GOALS TAB -->
        <div id="mini-goals" class="tab-content">
            <div class="mini-goal-form">
                <h3 style="margin-bottom: 15px; color: #333;">Create a Mini Goal</h3>
                <div class="form-group">
                    <label for="miniGoalCount">Applications Target:</label>
                    <input 
                        type="number" 
                        id="miniGoalCount" 
                        placeholder="e.g., 5" 
                        min="1"
                    >
                </div>
                <div id="timeRangeGroup">
                    <h4 style="color: #555; margin-bottom: 12px; font-size: 14px;">Set Time Frame</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="startTime">Start Time:</label>
                            <input 
                                type="time" 
                                id="startTime"
                            >
                        </div>
                        <div class="form-group">
                            <label for="endTime">End Time:</label>
                            <input 
                                type="time" 
                                id="endTime"
                            >
                        </div>
                    </div>
                </div>
                <button class="btn" onclick="createMiniGoal()" style="width: 100%;">Create Mini Goal</button>
            </div>

            <h3 style="margin-bottom: 15px; color: #333;">Active Mini Goals</h3>
            <div id="miniGoalsList">
                <div class="mini-goals-empty">No mini goals yet. Create one to get started!</div>
            </div>
        </div>

        <!-- COMPANIES TAB -->
        <div id="companies" class="tab-content">
            <div class="input-section">
                <label for="companyInput">Add Company:</label>
                <div class="input-group">
                    <input 
                        type="text" 
                        id="companyInput" 
                        placeholder="Enter company name" 
                    >
                    <button class="btn" onclick="addCompany()">Add</button>
                </div>
            </div>

            <div class="company-list" id="companyList">
                <div class="empty-message">No applications yet. Start adding!</div>
            </div>
        </div>
    </div>

    <script>
        let companies = JSON.parse(localStorage.getItem('companies')) || [];
        let miniGoals = JSON.parse(localStorage.getItem('miniGoals')) || [];

        const goalInput = document.getElementById('goalInput');
        const companyInput = document.getElementById('companyInput');
        const countDisplay = document.getElementById('count');
        const percentageDisplay = document.getElementById('percentage');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const companyList = document.getElementById('companyList');
        const miniGoalPeriod = document.getElementById('miniGoalPeriod');
        const customDaysGroup = document.getElementById('customDaysGroup');

        // Load goal from localStorage or use default
        const savedGoal = localStorage.getItem('goal');
        if (savedGoal) {
            goalInput.value = savedGoal;
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Mini goal period change
        miniGoalPeriod.addEventListener('change', function() {
            if (this.value === 'custom') {
                document.getElementById('customDaysGroup').style.display = 'block';
                document.getElementById('timeRangeGroup').style.display = 'none';
            } else if (this.value === 'timerange') {
                document.getElementById('customDaysGroup').style.display = 'none';
                document.getElementById('timeRangeGroup').style.display = 'block';
            } else {
                document.getElementById('customDaysGroup').style.display = 'none';
                document.getElementById('timeRangeGroup').style.display = 'none';
            }
        });

        function getPeriodDays(period, customDays = 0) {
            const periods = {
                'daily': 1,
                'weekly': 7,
                'monthly': 30,
                'custom': customDays
            };
            return periods[period] || 7;
        }

        function createMiniGoal() {
            const count = parseInt(document.getElementById('miniGoalCount').value);
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (!count || count < 1) {
                alert('Please enter a valid target number');
                return;
            }

            if (!startTime || !endTime) {
                alert('Please set both start and end times');
                return;
            }

            if (startTime >= endTime) {
                alert('End time must be after start time');
                return;
            }

            const today = new Date();
            const [startHour, startMin] = startTime.split(':');
            const [endHour, endMin] = endTime.split(':');
            
            const startDate = new Date(today);
            startDate.setHours(parseInt(startHour), parseInt(startMin), 0, 0);
            
            const endDate = new Date(today);
            endDate.setHours(parseInt(endHour), parseInt(endMin), 59, 999);

            miniGoals.push({
                id: Date.now(),
                target: count,
                period: 'timerange',
                startTime: startTime,
                endTime: endTime,
                startDate: startDate.toISOString(),
                endDate: endDate.toISOString(),
                completed: false,
                applicationsAtCreation: companies.length
            });

            document.getElementById('miniGoalCount').value = '';
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';

            saveData();
            updateDisplay();
        }

        function getApplicationsInPeriod(goal) {
            const startDate = new Date(goal.startDate);
            const endDate = new Date(goal.endDate);
            
            let applicationsInPeriod = 0;

            if (goal.period === 'timerange') {
                // For time range, check if applications were added today between start and end times
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const [startHour, startMin] = goal.startTime.split(':');
                const [endHour, endMin] = goal.endTime.split(':');
                
                const timeRangeStart = new Date(today);
                timeRangeStart.setHours(parseInt(startHour), parseInt(startMin), 0, 0);
                
                const timeRangeEnd = new Date(today);
                timeRangeEnd.setHours(parseInt(endHour), parseInt(endMin), 59, 999);
                
                applicationsInPeriod = companies.filter(company => {
                    const companyDate = new Date(company.date);
                    return companyDate >= timeRangeStart && companyDate <= timeRangeEnd;
                }).length;
            } else {
                // For date-based goals, check if applications were added within the date range
                applicationsInPeriod = companies.filter(company => {
                    const companyDate = new Date(company.date);
                    return companyDate >= startDate && companyDate <= endDate;
                }).length;
            }
            
            return applicationsInPeriod;
        }

        function deleteMiniGoal(id) {
            miniGoals = miniGoals.filter(g => g.id !== id);
            saveData();
            updateDisplay();
        }

        function completeMiniGoal(id) {
            const goal = miniGoals.find(g => g.id === id);
            if (goal) {
                goal.completed = true;
                saveData();
                updateDisplay();
            }
        }

        function renderMiniGoals() {
            const miniGoalsList = document.getElementById('miniGoalsList');

            if (miniGoals.length === 0) {
                miniGoalsList.innerHTML = '<div class="mini-goals-empty">No mini goals yet. Create one to get started!</div>';
                return;
            }

            miniGoalsList.innerHTML = miniGoals.map(goal => {
                const applicationsInPeriod = getApplicationsInPeriod(goal);
                const progress = Math.min((applicationsInPeriod / goal.target) * 100, 100);
                const endDate = new Date(goal.endDate);
                const today = new Date();
                today.setHours(23, 59, 59, 999);
                const isExpired = today > endDate;

                let status = 'on-track';
                let statusText = 'On Track';

                if (goal.completed) {
                    status = 'completed';
                    statusText = '✓ Completed';
                } else if (isExpired) {
                    status = 'behind';
                    statusText = 'Expired';
                } else if (applicationsInPeriod >= goal.target) {
                    status = 'completed';
                    statusText = '✓ Completed';
                }

                const timeDisplay = `${goal.startTime} - ${goal.endTime}`;
                const dateDisplay = `Today (${new Date().toLocaleDateString()}): ${goal.startTime} - ${goal.endTime}`;

                return `
                    <div class="mini-goal-item">
                        <div class="mini-goal-header">
                            <div class="mini-goal-title">${goal.target} applications between ${timeDisplay}</div>
                            <div class="mini-goal-status status-${status}">${statusText}</div>
                        </div>
                        <div class="mini-goal-time">
                            ${dateDisplay}
                        </div>
                        <div class="mini-goal-progress-label">
                            <span>Progress: ${applicationsInPeriod} / ${goal.target}</span>
                            <span>${Math.round(progress)}%</span>
                        </div>
                        <div class="mini-goal-progress-bar">
                            <div class="mini-goal-progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <div class="mini-goal-actions">
                            ${!goal.completed && applicationsInPeriod >= goal.target ? 
                                `<button class="mini-goal-actions button btn-complete" onclick="completeMiniGoal(${goal.id})">Mark Complete</button>` : 
                                ''}
                            <button class="mini-goal-actions button btn-delete-mini" onclick="deleteMiniGoal(${goal.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateDisplay() {
            const goal = parseInt(goalInput.value) || 50;
            const count = companies.length;
            const percentage = Math.round((count / goal) * 100);

            countDisplay.textContent = count;
            percentageDisplay.textContent = (percentage > 100 ? 100 : percentage) + '%';
            progressFill.style.width = Math.min(percentage, 100) + '%';
            progressText.textContent = `${count} / ${goal}`;

            renderCompanyList();
            renderMiniGoals();
        }

        function addCompany() {
            const name = companyInput.value.trim();
            if (name === '') {
                alert('Please enter a company name');
                return;
            }

            companies.push({
                id: Date.now(),
                name: name,
                date: new Date().toISOString()
            });

            companyInput.value = '';
            saveData();
            updateDisplay();
            companyInput.focus();
        }

        function removeCompany(id) {
            companies = companies.filter(c => c.id !== id);
            saveData();
            updateDisplay();
        }

        function saveData() {
            localStorage.setItem('companies', JSON.stringify(companies));
            localStorage.setItem('miniGoals', JSON.stringify(miniGoals));
            localStorage.setItem('goal', goalInput.value);
        }

        function renderCompanyList() {
            if (companies.length === 0) {
                companyList.innerHTML = '<div class="empty-message">No applications yet. Start adding!</div>';
                return;
            }

            companyList.innerHTML = companies
                .reverse()
                .map((company, index) => `
                    <div class="company-item">
                        <div>
                            <div class="company-name">${companies.length - index}. ${company.name}</div>
                            <div style="font-size: 12px; color: #999;">${new Date(company.date).toLocaleString()}</div>
                        </div>
                        <button class="delete-btn" onclick="removeCompany(${company.id})">Delete</button>
                    </div>
                `)
                .join('');
        }

        // Event listeners
        goalInput.addEventListener('change', () => {
            saveData();
            updateDisplay();
        });

        companyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addCompany();
            }
        });

        // Initial display
        updateDisplay();
    </script>
</body>
</html>
